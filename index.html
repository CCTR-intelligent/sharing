<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼桩桩私桩共享项目介绍</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: #e5e5ea;
      --brand: #58b3df;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 800;
    }

    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: #fff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    nav a:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .page {
      margin: 0 0 32px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.08);
    }

    .page-label {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
      background: #fff;
    }

    footer {
      padding: 0 20px 36px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 18px 10px 32px;
      }

      .page {
        margin-bottom: 18px;
        padding: 8px;
        border-radius: 10px;
      }
    }

    @media print {
      header,
      footer,
      .page-label {
        display: none;
      }

      body,
      main,
      .page {
        margin: 0;
        padding: 0;
        background: #fff;
        border: 0;
        box-shadow: none;
      }

      .page {
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>拼桩桩私桩共享项目介绍</h1>
      <nav aria-label="页面导航">
        <a href="#page-1">01</a>
        <a href="#page-2">02</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page" id="page-1">
      <p class="page-label">PAGE 01 / 02</p>
      <img src="assets/page-1.png" alt="拼桩桩私桩共享项目介绍第 1 页">
    </section>

    <section class="page" id="page-2">
      <p class="page-label">PAGE 02 / 02</p>
      <img src="assets/page-2.png" alt="拼桩桩私桩共享项目介绍第 2 页" loading="lazy">
    </section>
  </main>

  <footer>由原始图片保真转换，可直接在浏览器中打开浏览。</footer>
</body>
</html>
